services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/chatdb
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GIN_MODE: release
      GRPC_PORT: "50051"
    dns:
      - "127.0.0.11"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      postgres:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 1536M
        reservations:
          cpus: "2.0"
          memory: 512M

  llm-request-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: worker
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      API_HOST: api
      GRPC_PORT: "50051"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_started
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 256M
        reservations:
          cpus: "0.5"
          memory: 64M

  persistence:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: persistence
    env_file: .env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/chatdb
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      postgres:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          cpus: "0.1"
          memory: 32M

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/chatdb
    depends_on:
      - postgres
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 2
      KAFKA_HEAP_OPTS: "-Xmx768m -Xms768m"
      KAFKA_NUM_NETWORK_THREADS: "6"
      KAFKA_NUM_IO_THREADS: "16"
      KAFKA_LOG_RETENTION_MS: "600000"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1.5G
        reservations:
          cpus: "1.0"
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: chatdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512M

  locust-master:
    build:
      context: .
      dockerfile: Dockerfile.locust
    profiles: ["benchmark"]
    hostname: locust-master
    ports:
      - "8089:8089"
    volumes:
      - ./locustfile.py:/mnt/locust/locustfile.py
    command: -f /mnt/locust/locustfile.py --master --host http://api:8000
    environment:
      JWT_SECRET: ${JWT_SECRET:-secret}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  locust-worker:
    build:
      context: .
      dockerfile: Dockerfile.locust
    profiles: ["benchmark"]
    volumes:
      - ./locustfile.py:/mnt/locust/locustfile.py
    command: -f /mnt/locust/locustfile.py --worker --master-host locust-master
    environment:
      JWT_SECRET: ${JWT_SECRET:-secret}
    depends_on:
      - locust-master
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

volumes:
  postgres_data:
