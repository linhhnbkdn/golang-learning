services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/chatdb
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      - kafka
      - redis
      - postgres
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: worker
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
      - redis
    restart: unless-stopped

  persistence:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: persistence
    env_file: .env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/chatdb
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
      - redis
      - postgres
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/chatdb
    depends_on:
      - postgres
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: chatdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
