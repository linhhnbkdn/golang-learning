services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/chatdb
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GIN_MODE: release
      GOMAXPROCS: "12"
    dns:
      - "127.0.0.11"
    depends_on:
      - kafka
      - redis
      - postgres
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 256M
        reservations:
          cpus: "1.0"
          memory: 128M

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: worker
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
      - redis
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  persistence:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: persistence
    env_file: .env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/chatdb
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
      - redis
      - postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          cpus: "0.1"
          memory: 32M

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/chatdb
    depends_on:
      - postgres
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1.5G
        reservations:
          cpus: "1.0"
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no --io-threads 4 --io-threads-do-reads yes
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: chatdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512M

  k6:
    image: grafana/k6
    profiles: ["benchmark"]
    ports:
      - "5665:5665"
    volumes:
      - ./k6:/scripts
    command: run --out json=/scripts/results.json /scripts/script.js
    environment:
      JWT_SECRET: ${JWT_SECRET:-secret}
      K6_WEB_DASHBOARD: "true"
      K6_WEB_DASHBOARD_PORT: "5665"
      K6_WEB_DASHBOARD_OPEN: "false"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 1G
        reservations:
          cpus: "2.0"
          memory: 512M

volumes:
  postgres_data:
